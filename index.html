<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת שעות בית הספר</title>
<style>
  :root {
    --bg: #f6f8fc;
    --surface: #ffffff;
    --surface2: #eef3ff;
    --border: #d8e1f2;
    --accent: #4f7cff;
    --accent2: #7c3aed;
    --text-primary: #1f2a44;
    --text-secondary: #5f6f91;
    --text-muted: #8090af;
    --radius: 12px;
    --radius-sm: 8px;
    --chip-class: #e8f0ff;
    --chip-teacher: #f2eaff;
    --chip-mode-school: #e9f8ee;
    --chip-mode-remote: #fff3e6;
    --chip-room: #f1f5f9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }
  header { background: linear-gradient(135deg, #ffffff 0%, #f4f7ff 100%); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: center; gap: 14px; }
  .logo { width: 40px; height: 40px; flex-shrink: 0; }
  .header-text h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
  .header-text p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 1px; }
  main { max-width: 950px; margin: 0 auto; padding: 24px 16px 48px; }
  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 11px 16px; border: none; background: transparent; color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .tab-btn:hover { background: var(--surface2); color: var(--text-primary); }
  .tab-btn.active { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color: #fff; box-shadow: 0 4px 16px rgba(79,124,255,0.28); }
  .search-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px 16px; margin-bottom: 20px; }
  .search-label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; margin-bottom: 8px; display: block; }
  .search-row { display: flex; gap: 10px; align-items: center; }
  .search-input-wrapper { position: relative; flex: 1; }
  .search-input { width: 100%; padding: 13px 42px 13px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 1rem; font-family: inherit; direction: rtl; transition: border-color 0.2s; outline: none; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,0.12); }
  .search-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-btn { padding: 13px 24px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .search-btn:hover { opacity: 0.9; }
  .search-btn:active { transform: scale(0.97); }
  .suggestions { position: absolute; top: calc(100% + 4px); right: 0; left: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); z-index: 200; max-height: 220px; overflow-y: auto; box-shadow: 0 10px 28px rgba(31,42,68,0.12); display:none; }
  .suggestion-item { padding: 10px 15px; cursor: pointer; font-size: 0.92rem; transition: background 0.12s; border-bottom: 1px solid var(--border); }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.highlighted { background: var(--accent); color: #fff; }
  .highlight { font-weight: 700; text-decoration: underline; }
  .quick-picks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .quick-pick { padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .quick-pick:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .quick-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 12px; margin-bottom: 5px; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .results-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
  .results-title-class { font-size: 1.35rem; font-weight: 700; }
  .results-count { font-size: 0.82rem; color: var(--text-secondary); background: var(--surface2); border: 1px solid var(--border); padding: 5px 10px; border-radius: 999px; }
  .date-group { margin-bottom: 18px; }
  .date-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .date-badge { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color: #fff; padding: 7px 12px; border-radius: 999px; font-size: 0.84rem; font-weight: 700; }
  .date-day { color: var(--text-secondary); font-size: 0.92rem; font-weight: 600; }
  .time-slots { display: flex; flex-direction: column; gap: 12px; }
  .time-slot { display: grid; grid-template-columns: 120px 1fr; gap: 12px; align-items: start; }
  .slot-time { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; position: sticky; top: 10px; }
  .slot-time-label { font-size: 0.95rem; font-weight: 700; color: var(--accent2); }
  .slot-cards { display: grid; gap: 10px; }
  .lesson-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .card-subject { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
  .card-secondary { font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; }
  .card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 0.8rem; border: 1px solid var(--border); }
  .chip-class { background: var(--chip-class); }
  .chip-teacher { background: var(--chip-teacher); }
  .chip-mode-school { background: var(--chip-mode-school); }
  .chip-mode-remote { background: var(--chip-mode-remote); }
  .chip-room { background: var(--chip-room); }
  .state-empty, .no-results { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 34px 20px; text-align: center; color: var(--text-secondary); }
  .state-empty svg { margin-bottom: 10px; }
  .hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  footer { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 0 16px 26px; }
  @media (max-width: 760px) {
    .search-row { flex-direction: column; }
    .search-btn { width: 100%; }
    .time-slot { grid-template-columns: 1fr; }
    .slot-time { position: static; }
  }
</style>
</head>

    <rect x="8" y="8" width="48" height="48" rx="12" fill="#4f7cff" opacity="0.12"></rect>

  <div class="header-text">

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-teacher" onclick="switchTab('teacher')">חיפוש מורה</button>

      <div class="quick-picks" id="quick-picks"></div>
    </div>
  </div>

  <div id="results-area">
    <div class="state-empty">
      <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="8" width="48" height="48" rx="8" fill="#4f7cff" opacity="0.10"/>
        <path d="M20 28h24M20 36h16" stroke="#4f7cff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <p>חפש מורה או כיתה כדי לראות את המערכת</p>
      <p class="hint">מציג את הנתונים המעודכנים של יום ראשון 22/03</p>
    </div>
  </div>
</main>
<footer>מערכת שעות</footer>

3", "date_sort": 2203, "time": "14:15", "class": "י6", "teacher": "ציון אבי", "subject": "הנדסת תוכנה וסייבר - פיזיקה", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י7", "teacher": "וטשטיין ניר", "subject": "מוסיקה הרכב", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י7", "teacher": "ציון אבי", "subject": "הנדסת תוכנה וסייבר - פיזיקה", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י8", "teacher": "וטשטיין ניר", "subject": "מוסיקה הרכב", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י8", "teacher": "ציון אבי", "subject": "הנדסת תוכנה וסייבר - פיזיקה", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י9", "teacher": "וטשטיין ניר", "subject": "מוסיקה הרכב", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}, {"day": "ראשון", "date": "22/03", "date_sort": 2203, "time": "14:15", "class": "י9", "teacher": "ציון אבי", "subject": "הנדסת תוכנה וסייבר - פיזיקה", "mode": "מרחוק", "room": "", "source_sheet": "יום ראשון ט-י למידה מרחוק"}]</script>
<script>
let allLessons = [];
let currentTab = 'teacher';
let allTeachers = [];
let allClasses = [];
let teacherDisplayByKey = new Map();
let suggestionsVisible = false;
let highlightedIdx = -1;

function clean(s) { return String(s || '').replace(/\s+/g, ' ').trim(); }
function esc(s) { return String(s).replaceAll('\\', '\\\\').replaceAll("'", "\\'"); }
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function normalizeTeacherKey(name) {
  return clean(name)
    .split(' ')
    .filter(Boolean)
    .sort((a, b) => a.localeCompare(b, 'he'))
    .join(' ');
}
function highlightMatch(item, q) {
  const safeItem = escapeHtml(item);
  const safeQ = escapeHtml(q);
  return q && item.includes(q) ? safeItem.replace(safeQ, `<span class="highlight">${safeQ}</span>`) : safeItem;
}
function modeChipClass(mode) { return mode === 'בית הספר' ? 'chip-mode-school' : 'chip-mode-remote'; }

function loadData() {
  try {
    const embeddedText = document.getElementById('embedded-schedule-data')?.textContent || '[]';
    const parsed = JSON.parse(embeddedText);
    if (Array.isArray(parsed) && parsed.length) return Promise.resolve(parsed);
  } catch (e) {}

  return fetch('schedule_data.json').then(r => {
    if (!r.ok) throw new Error('failed to fetch');
    return r.json();
  });
}

loadData()
  .then(data => {
    allLessons = data.map(l => ({
      day: clean(l.day),
      date: clean(l.date),
      date_sort: Number(l.date_sort) || 0,
      time: clean(l.time),
      class: clean(l.class),
      teacher: clean(l.teacher),
      subject: clean(l.subject),
      mode: clean(l.mode),
      room: clean(l.room),
      source_sheet: clean(l.source_sheet)
    }));

    const teacherCountsByKey = new Map();
    const classSet = new Set();

    allLessons.forEach(l => {
      if (l.teacher) {
        const key = normalizeTeacherKey(l.teacher);
        if (!teacherCountsByKey.has(key)) teacherCountsByKey.set(key, new Map());
        const variants = teacherCountsByKey.get(key);
        variants.set(l.teacher, (variants.get(l.teacher) || 0) + 1);
      }
      if (l.class) classSet.add(l.class);
    });

    teacherCountsByKey.forEach((variants, key) => {
      const bestVariant = [...variants.entries()].sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0], 'he'))[0][0];
      teacherDisplayByKey.set(key, bestVariant);
    });

    allTeachers = [...teacherDisplayByKey.values()].sort((a,b) => a.localeCompare(b, 'he'));
    allClasses = [...classSet].sort(sortClasses);
    renderQuickPicks();
  })
  .catch(err => {
    console.error('Failed to load data', err);
    document.getElementById('results-area').innerHTML = `
      <div class="no-results">
        <p style="font-size:1rem;font-weight:600;margin-bottom:6px;">שגיאה בטעינת הנתונים</p>
        <p style="color:var(--text-muted);font-size:0.87rem;">הקובץ כולל גם דאטה מוטמעת, אבל משהו נשבר בפענוח. פתח מחדש את index.html.</p>
      </div>`;
  });

function sortClasses(a, b) {
  const getGrade = s => {
    if (s.startsWith('יב')) return [4, parseInt(s.slice(2)) || 0];
    if (s.startsWith('יא')) return [3, parseInt(s.slice(2)) || 0];
    if (s.startsWith('י')) return [2, parseInt(s.slice(1)) || 0];
    if (s.startsWith('ט')) return [1, parseInt(s.slice(1)) || 0];
    return [5, 0];
  };
  const [ga, na] = getGrade(a);
  const [gb, nb] = getGrade(b);
  return ga !== gb ? ga - gb : na - nb;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-teacher').classList.toggle('active', tab === 'teacher');
  document.getElementById('tab-class').classList.toggle('active', tab === 'class');
  const input = document.getElementById('search-input');
  input.value = '';
  hideSuggestions();
  if (tab === 'teacher') {
    document.getElementById('search-label').textContent = 'שם המורה:';
    input.placeholder = 'חפש שם מורה...';
  } else {
    document.getElementById('search-label').textContent = 'כיתה:';
    input.placeholder = 'חפש כיתה (למשל יא4)...';
    document.getElementById('quick-label').textContent = 'כיתות מהירות:';
  }
  renderQuickPicks();
  document.getElementById('results-area').innerHTML = `
    <div class="state-empty">
      <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="8" width="48" height="48" rx="8" fill="#4f7cff" opacity="0.10"/>
        <path d="M20 28h24M20 36h16" stroke="#4f7cff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <p>חפש ${tab === 'teacher' ? 'מורה' : 'כיתה'} כדי לראות את המערכת</p>
      <p class="hint">יום ראשון 22/03</p>
    </div>`;
}

function renderQuickPicks() {
  const section = document.getElementById('quick-picks-section');
  const container = document.getElementById('quick-picks');
  if (currentTab === 'teacher') { section.style.display = 'none'; container.innerHTML = ''; return; }
  section.style.display = 'block';
  container.innerHTML = allClasses.map(item => `<button class="quick-pick" onclick="quickSearch('${esc(item)}')">${item}</button>`).join('');
}

function quickSearch(val) { document.getElementById('search-input').value = val; doSearch(); }

function onInput() {
  const q = clean(document.getElementById('search-input').value);
  if (!q) { hideSuggestions(); return; }
  let matches = [];
  if (currentTab === 'teacher') {
    const normalizedQ = normalizeTeacherKey(q);
    matches = allTeachers.filter(name => {
      const cleanName = clean(name);
      const key = normalizeTeacherKey(cleanName);
      return cleanName.includes(q) || key.includes(normalizedQ);
    }).slice(0, 8);
  } else {
    matches = allClasses.filter(t => t.includes(q)).slice(0, 12);
  }
  if (!matches.length) { hideSuggestions(); return; }
  showSuggestions(matches, q);
}

function showSuggestions(items, q) {
  const container = document.getElementById('suggestions');
  container.innerHTML = items.map((item, i) => `<div class="suggestion-item" data-idx="${i}" onmousedown="selectSuggestion('${esc(item)}')">${highlightMatch(item, q)}</div>`).join('');
  container.style.display = 'block';
  suggestionsVisible = true;
  highlightedIdx = -1;
}
function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; suggestionsVisible = false; highlightedIdx = -1; }
function selectSuggestion(val) { document.getElementById('search-input').value = val; hideSuggestions(); doSearch(); }
function onKeyDown(e) {
  if (!suggestionsVisible) { if (e.key === 'Enter') doSearch(); return; }
  const items = document.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIdx = Math.min(highlightedIdx + 1, items.length - 1); updateHighlight(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIdx = Math.max(highlightedIdx - 1, -1); updateHighlight(items); }
  else if (e.key === 'Enter') {
    if (highlightedIdx >= 0 && items[highlightedIdx]) selectSuggestion(items[highlightedIdx].textContent);
    else { hideSuggestions(); doSearch(); }
  } else if (e.key === 'Escape') hideSuggestions();
}
function updateHighlight(items) { items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIdx)); }
document.addEventListener('click', e => {
  if (!document.getElementById('search-input').contains(e.target) && !document.getElementById('suggestions').contains(e.target)) hideSuggestions();
});

function doSearch() {
  const q = clean(document.getElementById('search-input').value);
  hideSuggestions();
  if (!q) return;

  let results = [];
  if (currentTab === 'teacher') {
    const normalizedQuery = normalizeTeacherKey(q);
    results = allLessons.filter(l => normalizeTeacherKey(l.teacher) === normalizedQuery);
  } else {
    results = allLessons.filter(l => l.class === q);
  }

  if (!results.length) {
    document.getElementById('results-area').innerHTML = `
      <div class="no-results">
        <p style="font-size:1rem;font-weight:600;margin-bottom:6px;">לא נמצאו תוצאות עבור "${escapeHtml(q)}"</p>
        <p style="color:var(--text-muted);font-size:0.87rem;">נסה לבחור מהרשימה או לכתוב שם/כיתה בצורה חלקית</p>
      </div>`;
    return;
  }

  const byDate = {};
  results.forEach(l => {
    if (!byDate[l.date]) byDate[l.date] = { day: l.day, date_sort: l.date_sort, byTime: {} };
    if (!byDate[l.date].byTime[l.time]) byDate[l.date].byTime[l.time] = [];
    byDate[l.date].byTime[l.time].push(l);
  });
  const sortedDates = Object.keys(byDate).sort((a,b) => byDate[a].date_sort - byDate[b].date_sort);
  let totalLessons = 0;
  sortedDates.forEach(d => totalLessons += byDate[d] ? Object.values(byDate[d].byTime).reduce((n,arr)=>n+arr.length,0) : 0);
  const displayTitle = currentTab === 'teacher' ? (teacherDisplayByKey.get(normalizeTeacherKey(q)) || q) : q;

  let html = `
    <div class="results-header">
      <span class="results-title ${currentTab === 'class' ? 'results-title-class' : ''}">תוצאות עבור "${escapeHtml(displayTitle)}"</span>
      <span class="results-count">${totalLessons} שיעורים</span>
    </div>`;

  sortedDates.forEach(date => {
    const group = byDate[date];
    const sortedTimes = Object.keys(group.byTime).sort((a,b) => a.localeCompare(b, 'he'));
    html += `
      <div class="date-group">
        <div class="date-header">
          <span class="date-badge">${escapeHtml(date)}</span>
          <span class="date-day">יום ${escapeHtml(group.day)}</span>
        </div>
        <div class="time-slots">`;

    sortedTimes.forEach(time => {
      const lessons = group.byTime[time].slice().sort((a,b) => (a.class || '').localeCompare(b.class || '', 'he') || (a.teacher || '').localeCompare(b.teacher || '', 'he'));
      html += `<div class="time-slot"><div class="slot-time"><span class="slot-time-label">${escapeHtml(time)}</span></div><div class="slot-cards">`;
      lessons.forEach(l => {
        const secondary = currentTab === 'teacher' ? `<span class="card-secondary">כיתה: <bdi>${escapeHtml(l.class)}</bdi></span>` : `<span class="card-secondary">מורה: <bdi>${escapeHtml(l.teacher)}</bdi></span>`;
        const roomChip = l.room ? `<span class="chip chip-room"><bdi>${escapeHtml(l.room)}</bdi></span>` : '';
        const modeChip = l.mode ? `<span class="chip ${modeChipClass(l.mode)}"><bdi>${escapeHtml(l.mode)}</bdi></span>` : '';
        const classOrTeacherChip = currentTab === 'teacher'
          ? `<span class="chip chip-class"><bdi>${escapeHtml(l.class)}</bdi></span>`
          : `<span class="chip chip-teacher"><bdi>${escapeHtml(l.teacher)}</bdi></span>`;
        html += `
          <div class="lesson-card">
            <div class="card-top">
              <div class="card-subject">${escapeHtml(l.subject || 'ללא מקצוע')}</div>
              ${secondary}
            </div>
            <div class="card-chips">${classOrTeacherChip}${modeChip}${roomChip}</div>
          </div>`;
      });
      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('results-area').innerHTML = html;
}
</script>
</body>
