<style>
  :root {
    --bg: #f6f8fc;
    --surface: #ffffff;
    --surface2: #eef3ff;
    --border: #d8e1f2;
    --accent: #4f7cff;
    --accent2: #7c3aed;
    --text-primary: #1f2a44;
    --text-secondary: #5f6f91;
    --text-muted: #8090af;
    --card-hover: #f7faff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #ffffff 0%, #f4f7ff 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo { width: 40px; height: 40px; flex-shrink: 0; }
  .header-text h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .header-text p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 1px; }

  /* ── MAIN ── */
  main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 11px 16px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text-primary); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(79,124,255,0.28);
  }

  /* ── SEARCH PANEL ── */
  .search-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    margin-bottom: 20px;
  }
  .search-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 8px;
    display: block;
  }
  .search-row { display: flex; gap: 10px; align-items: center; }
  .search-input-wrapper { position: relative; flex: 1; }
  .search-input {
    width: 100%;
    padding: 13px 42px 13px 14px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 1rem;
    font-family: inherit;
    direction: rtl;
    transition: border-color 0.2s;
    outline: none;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,124,255,0.12);
  }
  .search-icon {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .search-btn {
    padding: 13px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .search-btn:hover { opacity: 0.9; }
  .search-btn:active { transform: scale(0.97); }

  /* ── SUGGESTIONS ── */
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    right: 0; left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    z-index: 200;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 10px 28px rgba(31,42,68,0.12);
  }
  .suggestion-item {
    padding: 10px 15px;
    cursor: pointer;
    font-size: 0.92rem;
    transition: background 0.12s;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.highlighted {
    background: var(--accent);
    color: #fff;
  }

  /* ── QUICK PICKS ── */
  .quick-picks {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .quick-pick {
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .quick-pick:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .quick-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 12px; margin-bottom: 5px; }

  /* ── RESULTS HEADER ── */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .results-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
  .results-title-class { font-size: 1.35rem; font-weight: 700; }
  .results-count {
    font-size: 0.82rem;
    color: var(--text-secondary);
    background: var(--surface2);
    padding: 3px 11px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  /* ── DATE GROUP ── */
  .date-group { margin-bottom: 28px; }
  .date-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .date-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 4px 13px;
    border-radius: 100px;
  }
  .date-day { color: var(--text-secondary); font-size: 0.88rem; font-weight: 500; }

  /* ── TIME SLOTS — vertical timeline ── */
  .time-slots { display: flex; flex-direction: column; gap: 8px; }

  .time-slot {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 0;
    align-items: stretch;
    min-height: 56px;
  }

  /* Left column: time */
  .slot-time {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 14px;
    position: relative;
  }
  .slot-time-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    line-height: 1;
  }
  /* vertical line */
  .slot-time::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 38px;
    bottom: -8px;
    width: 2px;
    background: var(--border);
    transform: translateX(-50%);
  }
  .time-slot:last-child .slot-time::after { display: none; }

  /* Right column: cards */
  .slot-cards {
    padding: 6px 0 6px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── LESSON CARD ── */
  .lesson-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px 10px;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .lesson-card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 0 3px 3px 0;
  }
  .lesson-card:hover {
    background: var(--card-hover);
    border-color: rgba(79,124,255,0.35);
    box-shadow: 0 2px 12px rgba(79,124,255,0.1);
  }

  /* Card subject row */
  .card-subject {
    font-size: 0.97rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 7px;
    line-height: 1.3;
  }
  /* When there are multiple subject-rows inside one card */
  .subject-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
  }
  .subject-row:last-child { margin-bottom: 0; }
  .subject-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Chips row */
  .card-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.75rem;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
    line-height: 1.2;
    direction: rtl;
    unicode-bidi: embed;
  }
  .chip-class {
    background: #f1eafe;
    color: #6f42c1;
    border: 1px solid #dbc8ff;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 4px 10px;
  }
  .chip-teacher {
    background: #e9f1ff;
    color: #315fbf;
    border: 1px solid #cfe0ff;
  }
  .chip-subject {
    background: #e9f9ef;
    color: #21824b;
    border: 1px solid #cbeed8;
  }

  /* multi-subject separator */
  .subject-separator {
    height: 1px;
    background: var(--border);
    margin: 8px 0 6px;
  }

  /* ── EMPTY / ERROR STATES ── */
  .state-empty {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-muted);
  }
  .state-empty svg { opacity: 0.28; margin-bottom: 14px; }
  .state-empty p { font-size: 0.97rem; line-height: 1.6; }
  .state-empty .hint { font-size: 0.83rem; color: var(--text-muted); margin-top: 6px; }

  .no-results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 44px 28px;
    text-align: center;
    color: var(--text-secondary);
  }

  .highlight {
    background: rgba(79,124,255,0.25);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    header { padding: 14px 16px; }
    .header-text h1 { font-size: 1.1rem; }
    main { padding: 16px 12px 40px; }

    .tabs { margin-bottom: 14px; }
    .tab-btn { font-size: 0.85rem; padding: 10px 8px; }

    .search-panel { padding: 14px 14px 12px; }
    .search-row { flex-direction: column; gap: 8px; }
    .search-btn { width: 100%; text-align: center; padding: 13px; }

    .time-slot { grid-template-columns: 52px 1fr; }
    .slot-time-label { font-size: 0.88rem; }

    .lesson-card { padding: 10px 12px 9px; }
    .card-subject, .subject-name { font-size: 0.9rem; }
    .chip { font-size: 0.72rem; padding: 2px 7px; }

    .date-badge { font-size: 0.82rem; }
  }

  .chip-mode {background:#eaf7ef;color:#237a46;border:1px solid #cde8d7;}
  .chip-room {background:#fff4e8;color:#9a5b0d;border:1px solid #f2d3ad;}
  .meta-row {display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
</style>

function highlightMatch(item, q) { const safeItem = escapeHtml(item); const safeQ = escapeHtml(q); return q && item.includes(q) ? safeItem.replace(safeQ, `<span class="highlight">${safeQ}</span>`) : safeItem; }
function extractTimeSort(timeText) { const m = clean(timeText).match(/(\d{1,2}):(\d{2})/); return m ? (parseInt(m[1], 10) * 60 + parseInt(m[2], 10)) : 9999; }
function uniqueSorted(values) { return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'he')); }
function classSortLabel(a, b) {
  const getGrade = s => { if (s.startsWith('יב')) return [4, parseInt(s.slice(2)) || 0]; if (s.startsWith('יא')) return [3, parseInt(s.slice(2)) || 0]; if (s.startsWith('י')) return [2, parseInt(s.slice(1)) || 0]; if (s.startsWith('ט')) return [1, parseInt(s.slice(1)) || 0]; return [5, 0]; };
  const [ga, na] = getGrade(a); const [gb, nb] = getGrade(b); return ga !== gb ? ga - gb : na - nb;
}
function doSearch() {
  const q = clean(document.getElementById('search-input').value); hideSuggestions(); if (!q) return;
  let results;
  if (currentTab === 'teacher') { const normalizedQuery = normalizeTeacherKey(q); results = allLessons.filter(l => normalizeTeacherKey(l.teacher) === normalizedQuery && l.date_sort >= TODAY_SORT); }
  else { results = allLessons.filter(l => l.class === q && l.date_sort >= TODAY_SORT); }
  if (!results.length) {
    document.getElementById('results-area').innerHTML = `<div class="no-results"><p style="font-size:1rem;font-weight:600;margin-bottom:6px;">לא נמצאו תוצאות עבור "${escapeHtml(q)}"</p><p style="color:var(--text-muted);font-size:0.87rem;">נסה לבחור מהרשימה או לכתוב שם/כיתה בצורה חלקית</p></div>`;
    return;
  }
  const byDate = {};
  results.forEach(l => { if (!byDate[l.date]) byDate[l.date] = { day: l.day, date_sort: l.date_sort, byTime: {} }; if (!byDate[l.date].byTime[l.time]) byDate[l.date].byTime[l.time] = []; byDate[l.date].byTime[l.time].push(l); });
  const sortedDates = Object.keys(byDate).sort((a, b) => byDate[a].date_sort - byDate[b].date_sort);
  let totalSlots = 0; sortedDates.forEach(d => totalSlots += Object.keys(byDate[d].byTime).length);
  const displayTitle = currentTab === 'teacher' ? (teacherDisplayByKey.get(normalizeTeacherKey(q)) || q) : q;
  let html = `<div class="results-header"><span class="results-title ${currentTab === 'class' ? 'results-title-class' : ''}">תוצאות עבור "${escapeHtml(displayTitle)}"</span><span class="results-count">${totalSlots} שיעורים ב-${sortedDates.length} ימים</span></div>`;
  sortedDates.forEach(date => {
    const group = byDate[date];
    const sortedTimes = Object.keys(group.byTime).sort((a, b) => ((group.byTime[a][0]?.time_sort || extractTimeSort(a)) - (group.byTime[b][0]?.time_sort || extractTimeSort(b))));
    html += `<div class="date-group"><div class="date-header"><span class="date-badge">${escapeHtml(date)}</span><span class="date-day">יום ${escapeHtml(group.day)}</span></div><div class="time-slots">`;
    sortedTimes.forEach(time => {
      const lessons = group.byTime[time];
      html += `<div class="time-slot"><div class="slot-time"><span class="slot-time-label">${escapeHtml(time)}</span></div><div class="slot-cards">`;
      if (currentTab === 'teacher') {
        const bySubject = {};
        lessons.forEach(l => {
          const subj = clean(l.subject);
          if (!bySubject[subj]) bySubject[subj] = { classes: [], classSet: new Set(), modes: [], rooms: [] };
          const cls = clean(l.class);
          if (!bySubject[subj].classSet.has(cls)) { bySubject[subj].classSet.add(cls); bySubject[subj].classes.push(cls); }
          if (l.mode) bySubject[subj].modes.push(l.mode);
          if (l.room) bySubject[subj].rooms.push(l.room);
        });
        const subjects = Object.keys(bySubject);
        if (subjects.length === 1) {
          const subj = subjects[0], data = bySubject[subj], classes = data.classes.sort(classSortLabel), modes = uniqueSorted(data.modes), rooms = uniqueSorted(data.rooms);
          html += `<div class="lesson-card"><div class="card-subject">${escapeHtml(subj)}</div><div class="card-chips">${classes.map(c => `<span class="chip chip-class"><bdi>${escapeHtml(c)}</bdi></span>`).join('')}</div><div class="meta-row">${modes.map(m => `<span class="chip chip-mode"><bdi>${escapeHtml(m)}</bdi></span>`).join('')}${rooms.map(r => `<span class="chip chip-room"><bdi>${escapeHtml(r)}</bdi></span>`).join('')}</div></div>`;
        } else {
          html += `<div class="lesson-card">`;
          subjects.forEach((subj, idx) => {
            const data = bySubject[subj], classes = data.classes.sort(classSortLabel), modes = uniqueSorted(data.modes), rooms = uniqueSorted(data.rooms);
            if (idx > 0) html += `<div class="subject-separator"></div>`;
            html += `<div class="subject-row"><span class="subject-name">${escapeHtml(subj)}</span></div><div class="card-chips">${classes.map(c => `<span class="chip chip-class"><bdi>${escapeHtml(c)}</bdi></span>`).join('')}</div><div class="meta-row">${modes.map(m => `<span class="chip chip-mode"><bdi>${escapeHtml(m)}</bdi></span>`).join('')}${rooms.map(r => `<span class="chip chip-room"><bdi>${escapeHtml(r)}</bdi></span>`).join('')}</div>`;
          });
          html += `</div>`;
        }
      } else {
        const bySubject = {};
        lessons.forEach(l => {
          const subj = clean(l.subject);
          if (!bySubject[subj]) bySubject[subj] = { teachers: [], modes: [] };
          const teacherLabel = teacherDisplayByKey.get(normalizeTeacherKey(l.teacher)) || clean(l.teacher);
          if (!bySubject[subj].teachers.includes(teacherLabel)) bySubject[subj].teachers.push(teacherLabel);
          if (l.mode) bySubject[subj].modes.push(l.mode);
        });
        const subjects = Object.keys(bySubject);
        if (subjects.length === 1) {
          const subj = subjects[0], teachers = uniqueSorted(bySubject[subj].teachers), modes = uniqueSorted(bySubject[subj].modes);
          html += `<div class="lesson-card"><div class="card-subject">${escapeHtml(subj)}</div><div class="card-chips">${teachers.map(t => `<span class="chip chip-teacher"><bdi>${escapeHtml(t)}</bdi></span>`).join('')}</div><div class="meta-row">${modes.map(m => `<span class="chip chip-mode"><bdi>${escapeHtml(m)}</bdi></span>`).join('')}</div></div>`;
        } else {
          html += `<div class="lesson-card">`;
          subjects.forEach((subj, idx) => {
            const teachers = uniqueSorted(bySubject[subj].teachers), modes = uniqueSorted(bySubject[subj].modes);
            if (idx > 0) html += `<div class="subject-separator"></div>`;
            html += `<div class="subject-row"><span class="subject-name">${escapeHtml(subj)}</span></div><div class="card-chips">${teachers.map(t => `<span class="chip chip-teacher"><bdi>${escapeHtml(t)}</bdi></span>`).join('')}</div><div class="meta-row">${modes.map(m => `<span class="chip chip-mode"><bdi>${escapeHtml(m)}</bdi></span>`).join('')}</div>`;
          });
          html += `</div>`;
        }
      }
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('results-area').innerHTML = html;
}
</script>
